<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 230" width="100%" height="230">
<defs>
  <pattern id="pg" width="8" height="8" patternUnits="userSpaceOnUse">
    <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(255,0,0,0.08)" stroke-width="0.5"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="800" height="230" fill="#0a0000"/>
<rect width="800" height="230" fill="url(#pg)"/>

<!-- Scanline red -->
<rect width="800" height="3" fill="rgba(255,0,0,0.1)">
  <animate attributeName="y" from="-3" to="233" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- Frame border red -->
<rect x="6" y="6" width="788" height="218" fill="none" stroke="rgba(255,0,0,0.35)" stroke-width="1"/>

<!-- Corners — red + yellow accent -->
<rect x="6"   y="6"   width="28" height="4"  fill="#ff0000"/>
<rect x="6"   y="6"   width="4"  height="28" fill="#ff0000"/>
<rect x="18"  y="18"  width="4"  height="4"  fill="#ffff00" opacity="0.8"/>

<rect x="766" y="6"   width="28" height="4"  fill="#ff0000"/>
<rect x="790" y="6"   width="4"  height="28" fill="#ff0000"/>
<rect x="778" y="18"  width="4"  height="4"  fill="#ffff00" opacity="0.8"/>

<rect x="6"   y="220" width="28" height="4"  fill="#ff0000"/>
<rect x="6"   y="196" width="4"  height="28" fill="#ff0000"/>
<rect x="18"  y="208" width="4"  height="4"  fill="#ffff00" opacity="0.8"/>

<rect x="766" y="220" width="28" height="4"  fill="#ff0000"/>
<rect x="790" y="196" width="4"  height="28" fill="#ff0000"/>
<rect x="778" y="208" width="4"  height="4"  fill="#ffff00" opacity="0.8"/>

<!-- Top red stripe -->
<rect x="6" y="38" width="788" height="1" fill="rgba(255,0,0,0.2)"/>
<!-- Bottom red stripe -->
<rect x="6" y="160" width="788" height="1" fill="rgba(255,0,0,0.2)"/>

<!-- Stars — red/white/yellow scattered -->
<rect x="55"  y="24"  width="2" height="2" fill="#ff4444"><animate attributeName="opacity" values="0.9;0.05;0.9" dur="2.4s" repeatCount="indefinite"/></rect>
<rect x="115" y="46"  width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.95;0.1" dur="3.2s" repeatCount="indefinite"/></rect>
<rect x="185" y="19"  width="3" height="3" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.05;0.7" dur="1.8s" repeatCount="indefinite"/></rect>
<rect x="268" y="38"  width="2" height="2" fill="#ffff00"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.1s" repeatCount="indefinite"/></rect>
<rect x="335" y="22"  width="2" height="2" fill="#ff4444"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></rect>
<rect x="415" y="44"  width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.8;0.05;0.8" dur="2.7s" repeatCount="indefinite"/></rect>
<rect x="496" y="27"  width="2" height="2" fill="#ff4444"><animate attributeName="opacity" values="0.1;0.85;0.1" dur="1.9s" repeatCount="indefinite"/></rect>
<rect x="562" y="15"  width="3" height="3" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="4.0s" repeatCount="indefinite"/></rect>
<rect x="625" y="40"  width="2" height="2" fill="#ffff00"><animate attributeName="opacity" values="0.9;0.05;0.9" dur="2.2s" repeatCount="indefinite"/></rect>
<rect x="704" y="24"  width="2" height="2" fill="#ff4444"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.0s" repeatCount="indefinite"/></rect>
<rect x="80"  y="157" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.05;0.6" dur="2.6s" repeatCount="indefinite"/></rect>
<rect x="735" y="150" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="1.7s" repeatCount="indefinite"/></rect>
<rect x="382" y="52"  width="2" height="2" fill="#ff0000"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.3s" repeatCount="indefinite"/></rect>
<rect x="455" y="17"  width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.0s" repeatCount="indefinite"/></rect>
<rect x="158" y="155" width="2" height="2" fill="#ffff00"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.9s" repeatCount="indefinite"/></rect>

<!-- ✖ NO RULES label top left -->
<text x="20" y="28" font-family="Courier New, monospace" font-size="11" fill="#ff0000" letter-spacing="2">&#x2716; NO RULES</text>

<!-- PUNK / CLASS top right -->
<text x="780" y="21" font-family="Courier New, monospace" font-size="10" fill="#ffff00" letter-spacing="1" text-anchor="end">&#x2605; PUNK ROCK</text>
<text x="780" y="34" font-family="Courier New, monospace" font-size="10" fill="#ffff00" letter-spacing="1" text-anchor="end">FULL STACK</text>

<!-- HP bar — red -->
<text x="20" y="180" font-family="Courier New, monospace" font-size="9" fill="#444">HP</text>
<rect x="38" y="170" width="132" height="7" fill="rgba(255,0,0,0.1)"/>
<rect x="38" y="170" width="0"   height="7" fill="#ff0000">
  <animate attributeName="width" from="0" to="132" dur="2s" fill="freeze"/>
</rect>

<!-- MP bar — yellow -->
<text x="20" y="196" font-family="Courier New, monospace" font-size="9" fill="#444">MP</text>
<rect x="38" y="186" width="132" height="7" fill="rgba(255,255,0,0.08)"/>
<rect x="38" y="186" width="0"   height="7" fill="#ffff00">
  <animate attributeName="width" from="0" to="82" dur="2.5s" fill="freeze"/>
</rect>

<!-- EXP -->
<text x="20" y="212" font-family="Courier New, monospace" font-size="9" fill="#333">EXP &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2591;&#x2591;&#x2591;</text>

<!-- ✖ decorations beside title -->
<text font-family="Courier New, monospace" font-size="18" font-weight="bold" text-anchor="middle" x="180" fill="#ff0000" opacity="0.6">
  <animate attributeName="y" values="100;94;100" dur="3.2s" repeatCount="indefinite"/>
  &#x2716;
</text>
<text font-family="Courier New, monospace" font-size="18" font-weight="bold" text-anchor="middle" x="620" fill="#ff0000" opacity="0.6">
  <animate attributeName="y" values="100;94;100" dur="3.2s" repeatCount="indefinite"/>
  &#x2716;
</text>

<!-- Main title — yellow/white punk glow -->
<text font-family="Courier New, monospace" font-size="40" font-weight="bold" text-anchor="middle" letter-spacing="8" x="400" fill="#ffff00">
  <animate attributeName="y" values="100;94;100" dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="fill" values="#ffff00;#ffffff;#ffff00" dur="2.2s" repeatCount="indefinite"/>
  FAJAR LAKSANA
</text>

<!-- Subtitle — red/white -->
<text font-family="Courier New, monospace" font-size="12" text-anchor="middle" letter-spacing="3" x="400" fill="#ff4444">
  <animate attributeName="y" values="126;120;126" dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="fill" values="#ff4444;#ffffff;#ff4444" dur="3s" repeatCount="indefinite"/>
  FULL STACK &#xB7; DESIGNER &#xB7; FINTECH REBEL
</text>

<!-- Blinking cursor -->
<text x="626" font-family="Courier New, monospace" font-size="12" fill="#ff0000">
  <animate attributeName="y" values="126;120;126" dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
  &#x2588;
</text>

<!-- PRESS START — red blink -->
<text x="400" y="153" font-family="Courier New, monospace" font-size="11" fill="#ff0000" text-anchor="middle" letter-spacing="4">
  <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
  &#x2716; NO RULES JUST SHIP &#x2716;
</text>

<!-- Walking pixel character — punk outfit (black jacket, yellow hair) -->
<g>
  <animateTransform attributeName="transform" type="translate" from="-90 0" to="890 0" dur="8s" repeatCount="indefinite"/>
  <ellipse cx="11" cy="218" rx="13" ry="2.5" fill="rgba(0,0,0,0.5)"/>
  <!-- Mohawk / spiky yellow hair -->
  <rect x="7"  y="161" width="4"  height="8"  fill="#ffff00"/>
  <rect x="11" y="158" width="3"  height="11" fill="#ffff00"/>
  <rect x="14" y="162" width="3"  height="7"  fill="#ffff00"/>
  <!-- Head -->
  <rect x="3"  y="169" width="16" height="12" fill="#f5c088"/>
  <!-- Eyes -->
  <rect x="5"  y="173" width="4"  height="3"  fill="#111"/>
  <rect x="13" y="173" width="4"  height="3"  fill="#111"/>
  <!-- Mouth — angry/smirk -->
  <rect x="8"  y="179" width="6"  height="2"  fill="#880000"/>
  <!-- Leather jacket body — black with red detail -->
  <rect x="1"  y="181" width="20" height="14" fill="#111111"/>
  <rect x="9"  y="183" width="4"  height="10" fill="#220000"/>
  <!-- Red collar/lapels -->
  <rect x="1"  y="181" width="4"  height="6"  fill="#cc0000"/>
  <rect x="17" y="181" width="4"  height="6"  fill="#cc0000"/>
  <!-- Left arm -->
  <rect x="-3" y="182" width="4" height="9" fill="#111111">
    <animate attributeName="y" values="182;186;182" dur="0.38s" repeatCount="indefinite"/>
  </rect>
  <!-- Right arm -->
  <rect x="21" y="186" width="4" height="9" fill="#111111">
    <animate attributeName="y" values="186;182;186" dur="0.38s" repeatCount="indefinite"/>
  </rect>
  <!-- Left leg -->
  <rect x="2"  y="195" width="7" height="10" fill="#1a1a1a">
    <animate attributeName="y" values="195;190;195" dur="0.38s" repeatCount="indefinite"/>
  </rect>
  <rect x="1"  y="204" width="9" height="4" fill="#ff0000">
    <animate attributeName="y" values="204;199;204" dur="0.38s" repeatCount="indefinite"/>
  </rect>
  <!-- Right leg -->
  <rect x="13" y="190" width="7" height="10" fill="#1a1a1a">
    <animate attributeName="y" values="190;195;190" dur="0.38s" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="199" width="9" height="4" fill="#ff0000">
    <animate attributeName="y" values="199;204;199" dur="0.38s" repeatCount="indefinite"/>
  </rect>
</g>

</svg>
